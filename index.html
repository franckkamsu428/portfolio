<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borcelle Gastronomie | Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: white; line-height: 1.6; scroll-behavior: smooth; }
        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: flex; align-items: center; gap: 12px; z-index: 9999; font-weight: 600; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4); transition: 0.4s; }
        header { height: 100vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('baniere.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo-main { width: 150px; margin-bottom: 20px; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 7vw, 4rem); color: var(--gold); }
        .container { max-width: 1200px; margin: auto; padding: 0 5%; }
        .section-header { text-align: center; margin: 60px 0 40px; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); }
        .grid-pro { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .card-pro { background: var(--card-bg); border: 1px solid #222; overflow: hidden; text-align: center; }
        .img-box { width: 100%; height: 280px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-info h3 { color: var(--gold); font-family: 'Playfair Display', serif; }
        .archive-bg { background: #050505; padding: 60px 0; border-top: 1px solid #1a1a1a; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; opacity: 0.5; }
        .card-archive { text-align: center; filter: grayscale(100%); }
        .card-archive img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; border: 1px solid #333; }
        footer { text-align: center; padding: 40px; color: #333; font-size: 0.8rem; }
    </style>
</head>
<body>

    <a href="https://wa.me/237683041117" class="whatsapp-btn" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="25"> Réserver une table
    </a>

    <header>
        <img src="logo.png" class="logo-main">
        <h1 class="hero-title">Borcelle Gastronomie</h1>
        <p style="font-style: italic; color: #ccc;">L'excellence à chaque bouchée.</p>
    </header>

    <main class="container">
        <div class="section-header"><h2>Nos Spécialités</h2></div>
        <div class="grid-pro">
            <div class="card-pro"><div class="img-box"><img src="ndole1.jpg"></div><div class="card-info"><h3>Ndolé Royal</h3></div></div>
            <div class="card-pro"><div class="img-box"><img src="poulet1.jpg"></div><div class="card-info"><h3>Poulet Braisé</h3></div></div>
            <div class="card-pro"><div class="img-box"><img src="poulet2.jpg"></div><div class="card-info"><h3>Poulet Gourmet</h3></div></div>
            <div class="card-pro"><div class="img-box"><img src="plat1.jpg"></div><div class="card-info"><h3>Le Plateau Borcelle</h3></div></div>
        </div>
    </main>

    <section class="archive-bg">
        <div class="container">
            <div class="section-header"><h2 style="font-size: 1.2rem; color: #444;">Archives & Parcours</h2></div>
            <div class="archive-grid">
                <div class="card-archive"><img src="coiffure1.jpg"><p>Beauté 1</p></div>
                <div class="card-archive"><img src="boutique1.jpg"><p>Mode 1</p></div>
                <div class="card-archive"><img src="portfolio1.jpg"><p>Ancien v1</p></div>
                <div class="card-archive"><img src="restaurant1.jpg"><p>Resto v1</p></div>
            </div>
        </div>
    </section>

    <footer>&copy; 2024 Borcelle Restaurant</footer>

</body>
</html>
